/* Navbar */
.navbar {

/* Header */
.header {
  text-align: center;
  padding: 80px 20px;
  background: linear-gradient(#000000aa, #000000aa), url('images/bg.jpg') center/cover;
}

.header h1 { font-size: 40px; }

/* Gallery */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 30px;
}

.card{
  background: #1a1;
  border-radius: 15px;
  overflow: hidden;
  text-align: center;
  transition: 0.3s;
}

.card img {
  width: 100%;
  height: 300px;
  object-fit: cover;
  cursor: pointer;
  position:center;
}

.button{
  display: inline-block;
  margin: 10px;
  padding: 10px 20px;
  background: #25D366;
  border-radius: 10px;
  color: white;
  text-decoration: none;
}

.card:hover { transform: scale(1.05); }

/* Popup */
.popup {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: #570000;
  justify-content: center;
  align-items: center;
}

.popup img {
  max-width: 90%;
  max-height: 90%;
}
